<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 口语·作文教练</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 装饰气泡 -->
        <div class="bubble" style="width:20px;height:20px;left:10%;animation-duration:6s;animation-delay:0s;"></div>
        <div class="bubble" style="width:15px;height:15px;left:30%;animation-duration:8s;animation-delay:2s;"></div>
        <div class="bubble" style="width:25px;height:25px;left:70%;animation-duration:7s;animation-delay:1s;"></div>
        <div class="bubble" style="width:12px;height:12px;left:85%;animation-duration:9s;animation-delay:3s;"></div>

        <!-- 水草装饰 -->
        <svg class="seaweed" style="left:5px;" width="60" height="120" viewBox="0 0 60 120" fill="none">
            <path d="M30 120C30 120 20 90 25 60C30 30 15 10 20 0" stroke="#5a9a8a" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
            <path d="M30 120C30 120 40 85 35 55C30 25 45 15 40 5" stroke="#7db9a8" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
            <circle cx="20" cy="5" r="3" fill="#a8d5c8" opacity="0.7"/>
        </svg>
        <svg class="seaweed" style="right:10px;" width="80" height="150" viewBox="0 0 80 150" fill="none">
            <path d="M40 150C40 150 25 110 35 75C45 40 20 20 30 0" stroke="#5a9a8a" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
            <path d="M40 150C40 150 55 105 45 70C35 35 60 25 50 10" stroke="#7db9a8" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
        </svg>

        <!-- 页面容器 -->
        <div id="pages-container">
            <!-- 首页 -->
            <div id="page-home" class="page active"></div>
            <!-- 口语教练 -->
            <div id="page-speak" class="page"></div>
            <!-- 作文批改 -->
            <div id="page-write" class="page"></div>
            <!-- 学习报告 -->
            <div id="page-report" class="page"></div>
            <!-- 个人中心 -->
            <div id="page-profile" class="page"></div>
            <!-- 全真模考 -->
            <div id="page-exam" class="page"></div>
            <!-- 专项提升 -->
            <div id="page-improve" class="page"></div>
        </div>

        <!-- 底部导航栏 -->
        <nav class="tab-bar" id="tab-bar">
            <div class="tab-item active" data-tab="home" onclick="switchTab('home', this)">
                <svg class="tab-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span>首页</span>
            </div>
            <div class="tab-item" data-tab="speak" onclick="switchTab('speak', this)">
                <svg class="tab-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                </svg>
                <span>口语</span>
            </div>
            <div class="tab-item" data-tab="write" onclick="switchTab('write', this)">
                <svg class="tab-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
                <span>作文</span>
            </div>
            <div class="tab-item" data-tab="report" onclick="switchTab('report', this)">
                <svg class="tab-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                <span>报告</span>
            </div>
            <div class="tab-item" data-tab="profile" onclick="switchTab('profile', this)">
                <svg class="tab-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span>我的</span>
            </div>
        </nav>
    </div>

    <!-- 模态框容器 -->
    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()"></div>
    <div id="modal-container" class="modal-container hidden"></div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast hidden"></div>

    <script src="src/data/mockData.js"></script>
    <script src="src/utils/helpers.js"></script>
    <script src="src/pages/home.js"></script>
    <script src="src/pages/speak.js"></script>
    <script src="src/pages/write.js"></script>
    <script src="src/pages/report.js"></script>
    <script src="src/pages/profile.js"></script>
    <script src="src/pages/exam.js"></script>
    <script src="src/pages/improve.js"></script>
    <script src="src/app.js"></script>
</body>
</html>

version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-coach-backend
    working_dir: /app/backend
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8001
    volumes:
      - ./backend/.env:/app/backend/.env
      - ./backend/ai_coach.db:/app/backend/ai_coach.db
      - ./backend/models:/app/backend/models
    environment:
      - TZ=Asia/Shanghai
    restart: always
    networks:
      - ai-coach-net

  nginx:
    image: nginx:alpine
    container_name: ai-coach-nginx
    ports:
      - "5173:5173"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
    restart: always
    networks:
      - ai-coach-net

networks:
  ai-coach-net:
    driver: bridge
